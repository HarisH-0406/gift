<!doctype html>
<html lang="en">
  <head>
    <script>
      if (sessionStorage.getItem("verified") !== "yes") {
        window.location.replace("index.html");
      }
    </script>
    
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Review 💗</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Quicksand:wght@500&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        height: 100vh;
        padding: 20px;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #fff1f6, #fadadd, #ffe3ec);
        font-family: "Playfair Display", serif;
      }

      .review-card {
        width: 100%;
        max-width: 460px;
        background: white;
        padding: 35px;
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        text-align: center;
      }

      .review-title {
        color: #d94f8a;
        margin-bottom: 20px;
        font-size: 26px;
      }

      .review-text {
        width: 100%;
        height: 180px;
        border-radius: 15px;
        border: 2px solid #d94f8a;
        padding: 15px;
        font-family: "Quicksand", sans-serif;
        font-size: 15px;
        resize: none;
        box-sizing: border-box;
      }
      .review-note {
        margin-top: 15px;
        font-size: 14px;
        color: #777;
      }

      .saved-review {
        margin-top: 30px;
      }

      .saved-review img {
        width: 100%;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      .back-btn {
        position: fixed;
        bottom: 20px;
        left: 20px;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: none;
        background: #d94f8a;
        color: white;
        font-size: 22px;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.25s ease;
      }

      .back-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 0 18px rgba(217, 79, 138, 0.6);
      }
    </style>
  </head>

  <body>
    <div class="review-card">
      <h2 class="review-title">Your Review 💗</h2>
      <!--<textarea class="review-text" readonly>
Her message here...
</textarea>-->
      <textarea
        class="review-text"
        placeholder="Write something about my gift..."
      ></textarea>

      <p class="review-note">Copy your message and send it to me 💌</p>
    </div>

    <button class="back-btn" onclick="goBack()">←</button>

    <script>
      function goBack() {
        window.location.replace("ownbig.html?review=back");
      }
    </script>
  </body>
</html>
